<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OrderBridge</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260701" />
    <script src="/static/app.js?v=20260701" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">OrderBridge</p>
          <h1>Local orders and printing dashboard</h1>
          <p class="lede">Check service health, sync orders, and reprint from a simple local interface.</p>
        </div>
        <div class="hero-card">
          <div class="status-row">
            <span class="status-dot" id="serviceDot"></span>
            <div>
              <p class="label">Service status</p>
              <strong id="serviceStatus">Checking...</strong>
            </div>
          </div>
          <div class="controls">
            <button id="syncNowBtn" class="primary">Sync now</button>
            <button id="refreshBtn" class="secondary">Refresh</button>
          </div>
        </div>
      </section>

      <section class="panel printer-panel">
        <div class="panel-head">
          <div>
            <p class="label">Printers</p>
            <h2>Select a printer</h2>
          </div>
          <div class="printer-selected">
            <span class="label">Selected</span>
            <strong id="selectedPrinter">-</strong>
          </div>
        </div>
        <div class="printer-tools">
          <select id="printerSelect"></select>
          <button id="savePrinterBtn" class="secondary">Save printer</button>
          <button id="testPrinterBtn" class="ghost">Print test</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="label">Orders</p>
            <h2>Recent orders</h2>
          </div>
          <div class="mini-stats">
            <div><span>Orders</span><strong id="orderCount">0</strong></div>
            <div><span>Last sync</span><strong id="lastSync">-</strong></div>
          </div>
        </div>
        <div id="ordersGrid" class="orders-grid"></div>
      </section>
    </main>
  </body>
</html>
